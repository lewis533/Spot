<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#050508"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Replay"/>
<title>Replay</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#050508;--s1:#0a0a12;--card:#0f0f1a;
  --border:rgba(255,255,255,0.06);
  --b:#4f7fff;--bp:rgba(79,127,255,0.18);--bg2:rgba(79,127,255,0.35);
  --p:#a855f7;--pp:rgba(168,85,247,0.18);
  --g:#22d3ee;--gp:rgba(34,211,238,0.18);
  --text:#f0f0ff;--muted:rgba(255,255,255,0.35);
  --glass:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.07);
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow:hidden;user-select:none;}

/* ── ANIMATED MESH BG ── */
#meshBg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat linear infinite;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-40px) scale(1.1);}66%{transform:translate(-20px,30px) scale(0.9);}100%{transform:translate(0,0) scale(1);}}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:#050508;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity 0.8s ease;}
#splash.out{opacity:0;pointer-events:none;}
.splash-rings{position:relative;width:90px;height:90px;margin-bottom:1.5rem;}
.splash-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:ringPulse 1.5s ease-in-out infinite;}
.splash-ring:nth-child(1){border-color:rgba(79,127,255,0.8);animation-delay:0s;}
.splash-ring:nth-child(2){inset:-10px;border-color:rgba(168,85,247,0.5);animation-delay:0.3s;}
.splash-ring:nth-child(3){inset:-20px;border-color:rgba(34,211,238,0.3);animation-delay:0.6s;}
.splash-icon-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.6;}}
.splash-wordmark{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.12em;background:linear-gradient(135deg,#fff 0%,var(--b) 50%,var(--p) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.splash-progress{width:140px;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;margin-top:1.5rem;overflow:hidden;}
.splash-bar{height:100%;background:linear-gradient(90deg,var(--b),var(--p));width:0%;animation:sLoad 1.4s ease forwards;}
@keyframes sLoad{0%{width:0%;}100%{width:100%;}}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;z-index:1;}
.screen.active{display:flex;}

/* ── LOGIN ── */
#loginScreen{align-items:center;justify-content:center;padding:2rem;}
.login-card{background:rgba(10,10,18,0.8);border:1px solid var(--gb);border-radius:28px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:100%;backdrop-filter:blur(20px);animation:cardIn 0.8s cubic-bezier(.16,1,.3,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--b),var(--p));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.5rem;box-shadow:0 8px 32px rgba(79,127,255,0.4);}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:0.08em;line-height:0.9;background:linear-gradient(135deg,#fff,var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.75rem;}
.login-sub{font-size:0.85rem;color:var(--muted);line-height:1.7;margin-bottom:2rem;}
.btn-login{width:100%;padding:0.95rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:14px;font-weight:700;font-size:0.92rem;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all 0.25s;letter-spacing:0.02em;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(79,127,255,0.5);}
.btn-login svg{width:20px;height:20px;fill:#fff;}

/* ── TOPBAR ── */
.topbar{padding:3rem 1.25rem 0.75rem;position:relative;}
.topbar-inner{display:flex;align-items:flex-start;justify-content:space-between;}
.topbar-greeting{font-size:0.68rem;font-weight:700;color:var(--b);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:0.2rem;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:0.03em;line-height:0.95;}
.topbar-date{font-size:0.72rem;color:var(--muted);margin-top:0.2rem;}
.topbar-avatar{width:40px;height:40px;border-radius:12px;object-fit:cover;background:var(--bp);border:2px solid var(--b);cursor:pointer;margin-top:0.2rem;}
.topbar-av-ph{width:40px;height:40px;border-radius:12px;background:var(--bp);border:2px solid var(--b);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:var(--b);cursor:pointer;margin-top:0.2rem;}

/* ── SCROLL CONTENT ── */
.scroll-content{flex:1;overflow-y:auto;padding-bottom:85px;scrollbar-width:none;}
.scroll-content::-webkit-scrollbar{display:none;}

/* ── QUOTE STRIP ── */
.quote-strip{margin:0.75rem 1.25rem;padding:0.9rem 1.1rem;background:linear-gradient(135deg,rgba(79,127,255,0.08),rgba(168,85,247,0.08));border:1px solid var(--gb);border-radius:14px;font-size:0.8rem;color:rgba(255,255,255,0.55);font-style:italic;line-height:1.5;}
.quote-strip cite{font-style:normal;font-size:0.68rem;color:var(--muted);display:block;margin-top:0.25rem;}

/* ── TODAY CARD ── */
.today-card{margin:0 1.25rem 1rem;border-radius:22px;overflow:hidden;position:relative;cursor:pointer;min-height:200px;}
.tc-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0d1033,#1a0d33);}
.tc-art-blur{position:absolute;inset:-10%;width:120%;height:120%;background-size:cover;background-position:center;opacity:0.25;filter:blur(30px) saturate(2);transition:background-image 1s;}
.tc-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,8,0.9) 0%,transparent 60%);}
.tc-content{position:relative;z-index:2;padding:1.4rem;}
.tc-pill{display:inline-flex;align-items:center;gap:0.35rem;background:rgba(79,127,255,0.2);border:1px solid rgba(79,127,255,0.3);border-radius:50px;padding:0.25rem 0.75rem;font-size:0.62rem;font-weight:700;color:var(--b);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.9rem;}
.tc-dot{width:5px;height:5px;background:var(--b);border-radius:50%;animation:tcDot 1.5s ease infinite;}
@keyframes tcDot{0%,100%{opacity:1;}50%{opacity:0.3;}}
.tc-row{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.tc-art{width:64px;height:64px;border-radius:12px;object-fit:cover;background:#1a1a2e;flex-shrink:0;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.tc-track{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:0.02em;line-height:1;}
.tc-artist{font-size:0.8rem;color:rgba(255,255,255,0.55);margin-top:0.2rem;}
.tc-cta{display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;font-weight:700;font-size:0.75rem;padding:0.55rem 1.1rem;border-radius:50px;border:none;cursor:pointer;letter-spacing:0.04em;}

/* ── SAVE BTN ── */
.save-wrap{padding:0 1.25rem 0.75rem;}
.btn-save{width:100%;padding:1rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:14px;font-weight:700;font-size:0.92rem;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.25s;letter-spacing:0.02em;position:relative;overflow:hidden;}
.btn-save::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--p),var(--b));opacity:0;transition:opacity 0.3s;}
.btn-save:hover::before{opacity:1;}
.btn-save span{position:relative;z-index:1;}
.btn-save:disabled{background:var(--card);color:var(--muted);}
.btn-save:disabled::before{display:none;}

/* ── METRIC TILES ── */
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin:0 1.25rem 1rem;}
.metric-tile{background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1rem;backdrop-filter:blur(12px);text-align:center;}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.02em;background:linear-gradient(135deg,var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.metric-label{font-size:0.62rem;color:var(--muted);margin-top:0.15rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}

/* ── PERSONALITY ── */
.personality-strip{margin:0 1.25rem 1rem;border-radius:18px;overflow:hidden;position:relative;padding:1.3rem;}
.ps-bg{position:absolute;inset:0;}
.ps-content{position:relative;z-index:1;}
.ps-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:0.35rem;}
.ps-icon{font-size:2.2rem;margin-bottom:0.35rem;}
.ps-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.03em;line-height:1;}
.ps-desc{font-size:0.78rem;color:rgba(255,255,255,0.6);margin-top:0.35rem;line-height:1.5;}

/* ── ON THIS DAY ── */
.otd-card{margin:0 1.25rem 1rem;background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1rem;backdrop-filter:blur(12px);}
.otd-eyebrow{font-size:0.62rem;font-weight:700;color:var(--g);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.65rem;}
.otd-row{display:flex;align-items:center;gap:0.75rem;}
.otd-art{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--card);flex-shrink:0;}
.otd-track{font-weight:700;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.otd-sub{font-size:0.72rem;color:var(--muted);margin-top:0.1rem;}

/* ── SECTION HEADERS ── */
.sec{padding:0 1.25rem 1rem;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:0.05em;margin-bottom:0.85rem;display:flex;align-items:center;gap:0.5rem;}
.sec-title-dot{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--b),var(--p));flex-shrink:0;}

/* ── TRACK ROWS ── */
.track-list{display:flex;flex-direction:column;gap:0.45rem;}
.tr{display:flex;align-items:center;gap:0.85rem;padding:0.7rem;border-radius:14px;background:var(--glass);border:1px solid var(--gb);backdrop-filter:blur(8px);transition:all 0.2s;}
.tr:active{background:rgba(255,255,255,0.07);}
.tr-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted);width:18px;text-align:center;flex-shrink:0;}
.tr-img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--card);flex-shrink:0;}
.tr-img.r{border-radius:50%;}
.tr-meta{flex:1;min-width:0;}
.tr-name{font-weight:600;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-sub{font-size:0.72rem;color:var(--muted);margin-top:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-btn{width:30px;height:30px;background:var(--bp);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
.tr-btn svg{width:11px;height:11px;stroke:var(--b);fill:none;stroke-width:2.5;}

/* ── NAV ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,8,0.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.75rem 0;gap:0.22rem;background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.58rem;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s;}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;}
.nb.active{color:var(--b);}
.nb.active svg{filter:drop-shadow(0 0 6px var(--b));}

/* ── DIARY ── */
#diaryPage{overflow-y:auto;padding-bottom:85px;scrollbar-width:none;}
#diaryPage::-webkit-scrollbar{display:none;}
.diary-entry{margin:0 1.25rem 0.75rem;background:var(--glass);border:1px solid var(--gb);border-radius:18px;overflow:hidden;backdrop-filter:blur(12px);}
.de-header{padding:0.7rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.de-date{font-size:0.68rem;font-weight:700;color:var(--b);letter-spacing:0.08em;text-transform:uppercase;}
.de-body{display:flex;align-items:center;gap:0.9rem;padding:0.9rem 1rem;}
.de-art{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--card);flex-shrink:0;}
.de-info{flex:1;min-width:0;}
.de-track{font-weight:700;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.de-sub{font-size:0.72rem;color:var(--muted);margin-top:0.12rem;}
.de-open{width:30px;height:30px;background:var(--bp);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
.de-open svg{width:11px;height:11px;stroke:var(--b);fill:none;stroke-width:2.5;}

/* ── STATS PAGE ── */
#statsPage{overflow-y:auto;padding-bottom:85px;scrollbar-width:none;}
#statsPage::-webkit-scrollbar{display:none;}
.stat-sec{padding:0 1.25rem 1.5rem;}
.stat-sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.05em;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}

/* Genre chart */
.genre-chart{display:flex;flex-direction:column;gap:0.7rem;}
.gcr{display:flex;align-items:center;gap:0.75rem;}
.gcr-name{font-size:0.75rem;font-weight:600;width:85px;flex-shrink:0;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gcr-track{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.gcr-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--b),var(--p));width:0%;transition:width 1.4s cubic-bezier(.16,1,.3,1);}
.gcr-pct{font-size:0.68rem;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}

/* Trend chart */
.trend-chart{background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1rem;backdrop-filter:blur(10px);}
.trend-bars{display:flex;align-items:flex-end;gap:0.4rem;height:80px;margin-bottom:0.5rem;}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.3rem;}
.trend-bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--b),var(--p));min-height:4px;transition:height 1s cubic-bezier(.16,1,.3,1);}
.trend-bar-label{font-size:0.58rem;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:30px;}

/* Loyalty */
.loyalty-list{display:flex;flex-direction:column;gap:0.5rem;}
.li{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:0.9rem;display:flex;align-items:center;gap:0.9rem;backdrop-filter:blur(8px);}
.li-img{width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--card);flex-shrink:0;}
.li-info{flex:1;min-width:0;}
.li-name{font-weight:700;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-size:0.7rem;color:var(--muted);margin-top:0.1rem;}
.li-badge{display:inline-block;border-radius:50px;padding:0.12rem 0.55rem;font-size:0.6rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:0.25rem;}
.li-rank{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--b);flex-shrink:0;}

/* Discovery */
.disc-list{display:flex;flex-direction:column;gap:0.5rem;}
.di{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:0.8rem 1rem;display:flex;align-items:center;gap:0.9rem;backdrop-filter:blur(8px);}
.di-art{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--card);flex-shrink:0;}
.di-info{flex:1;min-width:0;}
.di-name{font-weight:600;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-sub{font-size:0.7rem;color:var(--muted);margin-top:0.1rem;}
.di-new{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#000;font-size:0.6rem;font-weight:800;padding:0.2rem 0.55rem;border-radius:4px;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0;}

/* Badges */
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;}
.badge-tile{background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1rem;text-align:center;backdrop-filter:blur(8px);position:relative;overflow:hidden;}
.badge-tile.unlocked{border-color:rgba(79,127,255,0.3);background:rgba(79,127,255,0.06);}
.badge-tile.unlocked::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,127,255,0.05),rgba(168,85,247,0.05));}
.badge-icon{font-size:1.8rem;margin-bottom:0.4rem;display:block;}
.badge-name{font-size:0.68rem;font-weight:700;letter-spacing:0.04em;}
.badge-locked{filter:grayscale(1);opacity:0.3;}
.badge-check{position:absolute;top:6px;right:6px;width:16px;height:16px;background:var(--b);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.55rem;}

/* Monthly recap */
.monthly-card{background:var(--glass);border:1px solid var(--gb);border-radius:18px;padding:1.25rem;backdrop-filter:blur(12px);margin-bottom:0.75rem;}
.mc-month{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.05em;color:var(--b);margin-bottom:0.75rem;}
.mc-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
.mc-stat{font-size:0.78rem;}
.mc-stat-val{font-weight:700;color:var(--text);font-size:0.88rem;}
.mc-stat-label{color:var(--muted);font-size:0.7rem;}

/* ── WRAPPED ── */
#wrappedScreen{display:none;position:fixed;inset:0;z-index:200;background:#000;overflow:hidden;}
.slide{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;overflow:hidden;}
.slide.active{display:flex;animation:sIn 0.55s cubic-bezier(.16,1,.3,1) both;}
@keyframes sIn{from{opacity:0;transform:scale(1.06) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.sl1{background:radial-gradient(ellipse at 30% 70%,#1a0050 0%,#050508 60%);}
.sl2{background:radial-gradient(ellipse at 70% 30%,#003322 0%,#050508 60%);}
.sl3{background:radial-gradient(ellipse at 50% 80%,#330000 0%,#050508 60%);}
.sl4{background:radial-gradient(ellipse at 20% 50%,#200040 0%,#050508 60%);}
.sl5{background:radial-gradient(ellipse at 80% 50%,#003344 0%,#050508 60%);}
.sl6{background:radial-gradient(ellipse at 50% 20%,#331a00 0%,#050508 60%);}
.sl7{background:radial-gradient(ellipse at 40% 60%,#001a33 0%,#050508 60%);}
.sl8{background:radial-gradient(ellipse at 60% 40%,#1a1a00 0%,#050508 60%);}
.slf{background:linear-gradient(160deg,#0a0a12,#050508);}
.prog-segs{position:absolute;top:14px;left:1rem;right:1rem;display:flex;gap:3px;}
.ps{flex:1;height:2px;background:rgba(255,255,255,0.15);border-radius:1px;overflow:hidden;}
.psf{height:100%;background:#fff;width:0%;transition:width 5s linear;border-radius:1px;}
.psf.done{width:100%;transition:none;}
.s-close{position:absolute;top:1.5rem;right:1rem;background:rgba(255,255,255,0.08);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(8px);}
.s-tap-l{position:absolute;left:0;top:0;bottom:0;width:40%;z-index:5;cursor:pointer;}
.s-tap-r{position:absolute;right:0;top:0;bottom:0;width:60%;z-index:5;cursor:pointer;}
.s-eye{font-size:0.65rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;opacity:0.45;margin-bottom:0.9rem;animation:fU 0.5s 0.2s both;}
.s-big{font-family:'Bebas Neue',sans-serif;font-size:6.5rem;line-height:0.85;letter-spacing:-0.02em;animation:scIn 0.5s 0.1s cubic-bezier(.16,1,.3,1) both;}
.s-big-lbl{font-size:0.95rem;font-weight:300;opacity:0.55;margin-top:0.5rem;animation:fU 0.5s 0.3s both;}
.s-aimg{width:155px;height:155px;border-radius:50%;object-fit:cover;margin:0 auto 1.4rem;box-shadow:0 20px 60px rgba(0,0,0,0.7);animation:scIn 0.5s 0.1s cubic-bezier(.16,1,.3,1) both;}
.s-tart{width:170px;height:170px;border-radius:18px;object-fit:cover;margin:0 auto 1.4rem;box-shadow:0 20px 60px rgba(0,0,0,0.7);animation:scIn 0.5s 0.1s cubic-bezier(.16,1,.3,1) both;}
.s-main{font-family:'Bebas Neue',sans-serif;font-size:2.7rem;letter-spacing:0.02em;line-height:1;animation:fU 0.5s 0.2s both;}
.s-sub{font-size:0.85rem;opacity:0.5;margin-top:0.45rem;animation:fU 0.5s 0.35s both;}
.s-tag{display:inline-block;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:50px;padding:0.3rem 0.85rem;font-size:0.75rem;font-weight:600;margin-top:0.9rem;animation:fU 0.5s 0.45s both;}
.s-chips{display:flex;flex-wrap:wrap;gap:0.45rem;justify-content:center;margin-top:0.9rem;animation:fU 0.5s 0.4s both;}
.s-chip{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.13);border-radius:50px;padding:0.28rem 0.75rem;font-size:0.72rem;font-weight:500;text-transform:capitalize;}
.s-picon{font-size:3.5rem;margin-bottom:0.75rem;animation:scIn 0.5s 0.1s both;}
.s-pname{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:0.03em;animation:fU 0.5s 0.2s both;}
.s-pdesc{font-size:0.82rem;opacity:0.55;margin-top:0.4rem;line-height:1.6;max-width:270px;animation:fU 0.5s 0.35s both;}
.tti-list{width:100%;text-align:left;animation:fU 0.5s 0.2s both;}
.tti{display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.tti:last-child{border:none;}
.tti-n{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:rgba(255,255,255,0.2);width:20px;flex-shrink:0;}
.tti-img{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#111;flex-shrink:0;}
.tti-img.r{border-radius:50%;}
.tti-info{flex:1;min-width:0;}
.tti-name{font-weight:600;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tti-art{font-size:0.72rem;color:rgba(255,255,255,0.38);margin-top:0.08rem;}
.s-streak-num{font-family:'Bebas Neue',sans-serif;font-size:8rem;line-height:0.85;background:linear-gradient(135deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:scIn 0.5s 0.1s both;}
@keyframes fU{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes scIn{from{opacity:0;transform:scale(0.65);}to{opacity:1;transform:scale(1);}}

/* ── MISC ── */
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--muted);gap:0.6rem;font-size:0.82rem;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--b);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-st{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:0.85rem;line-height:2;}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--b),var(--p));color:#fff;padding:0.6rem 1.2rem;border-radius:50px;font-size:0.8rem;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 6px 20px rgba(79,127,255,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.confetti-p{position:fixed;pointer-events:none;z-index:9998;border-radius:2px;animation:cFall linear forwards;}
@keyframes cFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
.page-hdr{padding:3.5rem 1.25rem 1.25rem;}
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:2.3rem;letter-spacing:0.04em;}
.ph-sub{font-size:0.75rem;color:var(--muted);margin-top:0.2rem;}
</style>

<script>
const CID='9bfa94ea5acd434e91bec6502a854a53',RU='https://lewspot.vercel.app';
const SC=['user-read-private','user-read-email','user-top-read','user-read-currently-playing','user-read-recently-played'].join(' ');
let token=null,user=null,snap=null,si=0,st=null,sd={};

const QUOTES=[
  {q:"Music gives a soul to the universe.",a:"Plato"},
  {q:"One good thing about music — when it hits you, you feel no pain.",a:"Bob Marley"},
  {q:"Without music, life would be a mistake.",a:"Nietzsche"},
  {q:"Music is the shorthand of emotion.",a:"Tolstoy"},
  {q:"Where words fail, music speaks.",a:"H.C. Andersen"},
  {q:"Music is the universal language of mankind.",a:"Longfellow"},
  {q:"Life is one grand song, so start singing.",a:"Sheryl Crow"},
];

const PERSONA={
  "hip hop":["The Hypebeast","You live for the beat and the bars. Culture flows through you.","🔥"],
  "afrobeats":["The Vibe Conductor","Energy follows you everywhere. Every room becomes a dance floor.","🥁"],
  "pop":["The Chart Climber","Always on the pulse. If it's trending, you knew it first.","⚡"],
  "r&b":["The Smooth Soul","Emotion is your language. Every song feels personal.","🌊"],
  "electronic":["The Night Architect","You build worlds with sound. The late hours are your canvas.","🌐"],
  "rock":["The Voltage Seeker","Raw, real, unfiltered. Music that hits like lightning.","🎸"],
  "jazz":["The Timeless Wanderer","Old soul, sharp ears, limitless taste.","🎷"],
  "classical":["The Depth Diver","You hear what others miss. Music is architecture.","🏛"],
  "default":["The Free Spirit","Your taste can't be boxed. You listen to what moves you.","🎵"],
};

const BADGES=[
  {id:'first',icon:'🎵',name:'First Log',req:1},
  {id:'week',icon:'🔥',name:'7 Day Streak',req:7,streak:true},
  {id:'month',icon:'📅',name:'30 Days',req:30},
  {id:'century',icon:'💯',name:'100 Days',req:100},
  {id:'explorer',icon:'🌍',name:'Explorer',genres:5},
  {id:'loyal',icon:'👑',name:'Loyal Fan',req:1,loyal:true},
];

function gPersona(genres){for(const g of genres){for(const[k,v]of Object.entries(PERSONA)){if(g.includes(k))return v;}}return PERSONA.default;}
function rstr(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a).map(x=>c[x%c.length]).join('');}
async function pkce(v){const d=new TextEncoder().encode(v),h=await crypto.subtle.digest('SHA-256',d);return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function loginWithSpotify(){const v=rstr(64),ch=await pkce(v);localStorage.setItem('rp_pkce',v);window.location='https://accounts.spotify.com/authorize?'+new URLSearchParams({response_type:'code',client_id:CID,scope:SC,redirect_uri:RU,code_challenge_method:'S256',code_challenge:ch});}
function logout(){localStorage.removeItem('rp_token');token=null;user=null;showScreen('loginScreen');}
async function spt(u){const r=await fetch('https://api.spotify.com/v1'+u,{headers:{Authorization:'Bearer '+token}});if(!r.ok){if(r.status===401)logout();return null;}return r.json();}
async function fbSet(p,d){
  if(!window._fb)return;
  await window._fb.db.ref(p).set(d);
}
async function fbGet(p){
  if(!window._fb)return null;
  const s=await window._fb.db.ref(p).once('value');
  return s.exists()?s.val():null;
}

function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function greet(){const h=new Date().getHours();return h<5?'Late night 🌙':h<12?'Good morning ☀️':h<17?'Good afternoon 🌤':h<21?'Good evening 🌆':'Night owl 🌙';}
function fmtShort(k){const[y,m,d]=k.split('-'),dt=new Date(y,m-1,d);if(k===todayKey())return'Today';const yest=new Date();yest.setDate(yest.getDate()-1);if(dt.toDateString()===yest.toDateString())return'Yesterday';return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtMonth(k){const[y,m]=k.split('-');return new Date(y,m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});}

function countUp(el,target,suffix='',dur=1400){
  let s=0,t0=null;
  const step=ts=>{if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,4);el.textContent=Math.floor(e*target)+suffix;if(p<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}
function haptic(t='l'){if(!navigator.vibrate)return;if(t==='l')navigator.vibrate(8);else if(t==='m')navigator.vibrate(25);else navigator.vibrate([15,8,15]);}
function confetti(){
  const cols=['#4f7fff','#a855f7','#22d3ee','#f97316','#22c55e','#fff'];
  for(let i=0;i<70;i++)setTimeout(()=>{const e=document.createElement('div');e.className='confetti-p';e.style.cssText=`left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;animation-duration:${1.5+Math.random()*2.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;document.body.appendChild(e);setTimeout(()=>e.remove(),4000);},i*25);
}

async function init(){
  // Always hide splash after 2.2s no matter what
  const hideSplash = () => document.getElementById('splash').classList.add('out');
  setTimeout(hideSplash, 1500);

  try {
    const p=new URLSearchParams(window.location.search);
    const code=p.get('code');
    if(code){
      const v=localStorage.getItem('rp_pkce');
      const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:RU,client_id:CID,code_verifier:v})});
      const data=await r.json();
      if(data.access_token){token=data.access_token;localStorage.setItem('rp_token',token);}
      window.history.replaceState(null,'',window.location.pathname);
    } else {
      token=localStorage.getItem('rp_token');
    }
  } catch(e){ console.error('Auth error',e); }

  // Show correct screen after splash
  setTimeout(()=>{
    if(!token){ showScreen('loginScreen'); return; }
    showScreen('homeScreen');
    document.getElementById('greeting').textContent=greet();
    document.getElementById('homeDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const q=QUOTES[new Date().getDate()%QUOTES.length];
    document.getElementById('quoteStrip').innerHTML=`"${q.q}" <cite>— ${q.a}</cite>`;
    loadUser().then(()=>loadHome());
  }, 1600);
}

async function loadUser(){
  const d=await spt('/me');if(!d)return;user=d;
  const name=d.display_name||d.id,av=d.images?.[0]?.url||'';
  const el=document.getElementById('topAv');
  if(av){const img=document.createElement('img');img.className='topbar-avatar';img.src=av;img.id='topAv';el.replaceWith(img);}
  else el.textContent=name[0].toUpperCase();
}

async function loadHome(){
  const key=todayKey();
  const[tracks,artists,recent,existing]=await Promise.all([
    spt('/me/top/tracks?limit=10&time_range=short_term'),
    spt('/me/top/artists?limit=10&time_range=short_term'),
    spt('/me/player/recently-played?limit=50'),
    user?fbGet(`replay/${user.id}/${key}`):null
  ]);

  // Deduplicated recently played tracks
  const seen=new Set();
  const recentTracks=(recent?.items||[]).map(i=>i.track).filter(t=>{if(seen.has(t.id))return false;seen.add(t.id);return true;}).slice(0,10);

  // Always use recent as fallback — no blank screens
  const tt=tracks?.items?.[0]||recentTracks[0]||null;
  const ta=artists?.items?.[0]||null;
  const isRecentMode=!tracks?.items?.length;

  if(tt){
    snap={date:key,
      track:{name:tt.name,artist:tt.artists?.map(a=>a.name).join(', ')||'',art:tt.album?.images?.[1]?.url||tt.album?.images?.[0]?.url||'',url:tt.external_urls?.spotify||''},
      artist:ta?{name:ta.name,art:ta.images?.[1]?.url||ta.images?.[0]?.url||'',url:ta.external_urls?.spotify||'',genres:ta.genres?.slice(0,3)||[]}:null,
      savedAt:Date.now()
    };
    renderTodayCard(snap,!!existing);
  } else {
    document.getElementById('todayCard').innerHTML='<div class="empty-st" style="padding:2rem 1.25rem;text-align:center;color:var(--muted);font-size:0.85rem;line-height:1.8;">Open Spotify and play a song —<br/>it will appear here instantly.</div>';
  }

  const btn=document.getElementById('saveBtn');
  btn.disabled=!!existing;
  btn.querySelector('span').textContent=existing?'✓ Already saved today':'Save Today's Snapshot';

  // Tracks — top tracks preferred, recently played as fallback
  const showTracks=tracks?.items?.length?tracks.items:recentTracks;
  if(showTracks.length){
    document.getElementById('secTracks').style.display='block';
    document.getElementById('tracksList').innerHTML=showTracks.slice(0,10).map((t,i)=>`
      <div class="tr">
        <div class="tr-num">${i+1}</div>
        <img class="tr-img" src="${t.album?.images?.[2]?.url||t.album?.images?.[0]?.url||''}" alt=""/>
        <div class="tr-meta">
          <div class="tr-name">${t.name}</div>
          <div class="tr-sub">${t.artists?.map(a=>a.name).join(', ')||''}${isRecentMode?' &middot; <span style="color:var(--b);font-size:0.62rem;font-weight:700;">RECENT</span>':''}</div>
        </div>
        <a class="tr-btn" href="${t.external_urls?.spotify||'#'}" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>`).join('');
  }

  // Artists — top artists preferred, extract from recent as fallback
  const showArtists=artists?.items?.length?artists.items:
    [...new Map(recentTracks.flatMap(t=>t.artists||[]).map(a=>[a.name,{name:a.name,images:[],genres:[],external_urls:a.external_urls||{}}])).values()].slice(0,5);

  if(showArtists.length){
    document.getElementById('secArtists').style.display='block';
    document.getElementById('artistsList').innerHTML=showArtists.slice(0,5).map((a,i)=>`
      <div class="tr">
        <div class="tr-num">${i+1}</div>
        <img class="tr-img r" src="${a.images?.[2]?.url||a.images?.[0]?.url||''}" alt="" style="${!a.images?.length?'background:linear-gradient(135deg,var(--b),var(--p));':''}"/>
        <div class="tr-meta">
          <div class="tr-name">${a.name}</div>
          <div class="tr-sub">${a.genres?.slice(0,2).join(', ')||'artist'}</div>
        </div>
        <a class="tr-btn" href="${a.external_urls?.spotify||'#'}" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>`).join('');
  }

  // Personality only if we have real artist genre data
  if(artists?.items?.length){
    const genres=artists.items.flatMap(a=>a.genres||[]);
    const[pn,pd,pi]=gPersona(genres);
    const bgs=[['#0d0033','#1a0044'],['#001a00','#002a00'],['#1a0000','#2e0000'],['#001a1a','#002e2e']];
    const bg=bgs[Math.floor(Math.random()*bgs.length)];
    document.getElementById('psCard').style.display='block';
    document.getElementById('psCard').innerHTML=`<div class="personality-strip"><div class="ps-bg" style="background:linear-gradient(135deg,${bg[0]},${bg[1]})"></div><div class="ps-content"><div class="ps-eyebrow">Your Music Personality</div><div class="ps-icon">${pi}</div><div class="ps-name">${pn}</div><div class="ps-desc">${pd}</div></div></div>`;
  }

  if(user){
    const allData=await fbGet(`replay/${user.id}`);
    if(allData){
      const entries=Object.values(allData).sort((a,b)=>b.date.localeCompare(a.date));
      const days=entries.length;
      let streak=0;const td=new Date();
      for(let i=0;i<365;i++){const d=new Date(td);d.setDate(td.getDate()-i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(allData[k])streak++;else break;}
      document.getElementById('metricRow').style.display='grid';
      setTimeout(()=>{countUp(document.getElementById('mDays'),days);countUp(document.getElementById('mStreak'),streak);countUp(document.getElementById('mMins'),days*32);},400);
      const wk=new Date();wk.setDate(wk.getDate()-7);
      const wkKey=`${wk.getFullYear()}-${String(wk.getMonth()+1).padStart(2,'0')}-${String(wk.getDate()).padStart(2,'0')}`;
      const wkE=allData[wkKey];
      if(wkE?.track){
        document.getElementById('otdCard').style.display='block';
        document.getElementById('otdCard').innerHTML=`<div class="otd-card"><div class="otd-eyebrow">📅 One week ago today</div><div class="otd-row"><img class="otd-art" src="${wkE.track.art}" alt=""/><div class="otd-info"><div class="otd-track">${wkE.track.name}</div><div class="otd-sub">${wkE.track.artist}</div></div></div></div>`;
      }
    }
  }
  sd={tracks:showTracks,artists:showArtists};
}

function renderTodayCard(s,saved){
  const art=s.track?.art||'';
  document.getElementById('todayCard').innerHTML=`<div class="today-card" onclick="openWrapped()"><div class="tc-bg"></div><div class="tc-art-blur" style="background-image:url('${art}')"></div><div class="tc-gradient"></div><div class="tc-content"><div class="tc-pill"><span class="tc-dot"></span>Today's Top</div>${s.track?`<div class="tc-row"><img class="tc-art" src="${s.track.art}" alt=""/><div><div class="tc-track">${s.track.name}</div><div class="tc-artist">${s.track.artist}</div></div></div>`:''}<button class="tc-cta">▶ Watch Your Replay</button></div></div>`;
}

async function saveToday(){
  if(!user||!snap)return;haptic('m');
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.querySelector('span').textContent='Saving...';
  await fbSet(`replay/${user.id}/${snap.date}`,snap);
  btn.querySelector('span').textContent='✓ Saved!';
  confetti();haptic('s');showToast('Snapshot saved to diary 🎵');
  const allData=await fbGet(`replay/${user.id}`);
  if(allData){const days=Object.values(allData).length;countUp(document.getElementById('mDays'),days);document.getElementById('metricRow').style.display='grid';}
}

async function loadDiary(){
  const el=document.getElementById('diaryList');
  if(!user){
    el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
    // Wait up to 3s for user to load
    let waited=0;
    while(!user&&waited<30){await new Promise(r=>setTimeout(r,100));waited++;}
    if(!user){el.innerHTML='<div class="empty-st">Could not load user.<br/>Try refreshing.</div>';return;}
  }
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const data=await fbGet(`replay/${user.id}`);
  if(!data){el.innerHTML='<div class="empty-st">No entries yet.<br/>Save today\'s snapshot to start.</div>';return;}
  const entries=Object.values(data).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('diaryCount').textContent=`${entries.length} entr${entries.length===1?'y':'ies'}`;
  el.innerHTML=entries.map(e=>`<div class="diary-entry"><div class="de-header"><div class="de-date">${fmtShort(e.date)} · ${e.date}</div></div>${e.track?`<div class="de-body"><img class="de-art" src="${e.track.art}" alt=""/><div class="de-info"><div class="de-track">${e.track.name}</div><div class="de-sub">${e.track.artist}${e.artist?' · '+e.artist.name:''}</div></div><a class="de-open" href="${e.track.url}" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>`:''}</div>`).join('');
}

async function loadStats(){
  const el=document.getElementById('statsContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const[arts,trks,sArts,sTrks,mTrks]=await Promise.all([
    spt('/me/top/artists?limit=20&time_range=medium_term'),
    spt('/me/top/tracks?limit=20&time_range=medium_term'),
    spt('/me/top/artists?limit=20&time_range=short_term'),
    spt('/me/top/tracks?limit=20&time_range=short_term'),
    spt('/me/top/tracks?limit=20&time_range=long_term'),
  ]);

  const ai=arts?.items||[];
  const sAn=new Set((sArts?.items||[]).map(a=>a.name));
  const mTn=new Set((mTrks?.items||[]).map(t=>t.name));

  // Genre chart
  const gc={};ai.forEach(a=>(a.genres||[]).forEach(g=>{gc[g]=(gc[g]||0)+1;}));
  const sg=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mg=sg[0]?.[1]||1;
  const genreHTML=`<div class="stat-sec"><div class="stat-sec-title"><span>🎨</span> Your Genres</div><div class="genre-chart">${sg.map(([g,c])=>`<div class="gcr"><div class="gcr-name">${g}</div><div class="gcr-track"><div class="gcr-fill" data-w="${Math.round(c/mg*100)}"></div></div><div class="gcr-pct">${Math.round(c/mg*100)}%</div></div>`).join('')}</div></div>`;

  // Trend chart — top artist per month from diary
  let trendHTML='';
  if(user){
    const allData=await fbGet(`replay/${user.id}`);
    if(allData){
      const entries=Object.values(allData);
      const monthly={};
      entries.forEach(e=>{const mk=e.date?.substring(0,7);if(mk&&e.track){monthly[mk]=monthly[mk]||[];monthly[mk].push(e.track.name);}});
      const months=Object.keys(monthly).sort().slice(-6);
      if(months.length>=2){
        const maxCount=Math.max(...months.map(m=>monthly[m].length));
        trendHTML=`<div class="stat-sec"><div class="stat-sec-title"><span>📈</span> Listening Trend</div><div class="trend-chart"><div class="trend-bars">${months.map(m=>{const cnt=monthly[m].length,h=Math.max(10,Math.round(cnt/maxCount*100));return`<div class="trend-bar-wrap"><div class="trend-bar" style="height:${h}%"></div><div class="trend-bar-label">${m.substring(5)}</div></div>`;}).join('')}</div></div></div>`;
      }
      // Monthly recap
      const recaps=months.slice(-3).reverse().map(m=>{
        const tracks=monthly[m]||[];
        const freq={};tracks.forEach(t=>{freq[t]=(freq[t]||0)+1;});
        const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
        return`<div class="monthly-card"><div class="mc-month">${fmtMonth(m+'-01')}</div><div class="mc-stats"><div class="mc-stat"><div class="mc-stat-val">${tracks.length}</div><div class="mc-stat-label">Days logged</div></div><div class="mc-stat"><div class="mc-stat-val" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${top?top[0]:'—'}</div><div class="mc-stat-label">Top track</div></div></div></div>`;
      }).join('');
      if(recaps) trendHTML+=`<div class="stat-sec"><div class="stat-sec-title"><span>🗓</span> Monthly Recaps</div>${recaps}</div>`;

      // Badges
      let streak=0;const td=new Date();
      for(let i=0;i<365;i++){const d=new Date(td);d.setDate(td.getDate()-i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(allData[k])streak++;else break;}
      const days=entries.length;
      const uGenres=new Set(ai.flatMap(a=>a.genres||[]));
      const badgeHTML=BADGES.map(b=>{
        let unlocked=false;
        if(b.streak)unlocked=streak>=b.req;
        else if(b.genres)unlocked=uGenres.size>=b.req;
        else if(b.loyal)unlocked=sAn.size>0;
        else unlocked=days>=b.req;
        return`<div class="badge-tile ${unlocked?'unlocked':''}"><span class="badge-icon ${unlocked?'':'badge-locked'}">${b.icon}</span><div class="badge-name" style="${unlocked?'':'color:var(--muted)'}">${b.name}</div>${unlocked?'<div class="badge-check">✓</div>':''}</div>`;
      }).join('');
      trendHTML+=`<div class="stat-sec"><div class="stat-sec-title"><span>🏅</span> Achievements</div><div class="badges-grid">${badgeHTML}</div></div>`;
    }
  }

  // Loyalty
  const loyalHTML=ai.length?`<div class="stat-sec"><div class="stat-sec-title"><span>🏆</span> Artist Loyalty</div><div class="loyalty-list">${ai.slice(0,5).map((a,i)=>{const loyal=sAn.has(a.name);return`<div class="li"><img class="li-img" src="${a.images?.[2]?.url||a.images?.[0]?.url||''}" alt=""/><div class="li-info"><div class="li-name">${a.name}</div><div class="li-sub">${(a.genres||[]).slice(0,1).join(', ')||'artist'}</div><span class="li-badge" style="${loyal?'background:rgba(79,127,255,0.15);color:var(--b);border:1px solid rgba(79,127,255,0.3)':'background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)'}">${loyal?'🔥 Still on top':'📉 Slipping'}</span></div><div class="li-rank">#${i+1}</div></div>`;}).join('')}</div></div>`:'';

  // Discoveries
  const nd=(sTrks?.items||[]).filter(t=>!mTn.has(t.name)).slice(0,5);
  const discHTML=nd.length?`<div class="stat-sec"><div class="stat-sec-title"><span>✨</span> New Discoveries</div><div class="disc-list">${nd.map(t=>`<div class="di"><img class="di-art" src="${t.album?.images?.[2]?.url||''}" alt=""/><div class="di-info"><div class="di-name">${t.name}</div><div class="di-sub">${t.artists?.map(a=>a.name).join(', ')||''}</div></div><span class="di-new">NEW</span></div>`).join('')}</div></div>`:`<div class="stat-sec"><div class="stat-sec-title"><span>✨</span> New Discoveries</div><div style="color:var(--muted);font-size:0.83rem;padding:0.5rem 0;">Keep listening — new discoveries will appear here.</div></div>`;

  el.innerHTML=genreHTML+trendHTML+loyalHTML+discHTML;
  setTimeout(()=>{document.querySelectorAll('.gcr-fill[data-w]').forEach(b=>{const w=b.getAttribute('data-w');b.style.width='0%';setTimeout(()=>b.style.width=w+'%',80);});},150);
}

// ── WRAPPED ──
function buildSlides(){
  const t=sd.tracks||[],a=sd.artists||[];
  const top=t[0],topA=a[0];
  const genres=a.flatMap(x=>x.genres||[]);
  const[pn,pd,pi]=gPersona(genres);
  const ug=[...new Set(genres)].slice(0,5);
  const slides=[];

  slides.push(`<div class="slide sl1" id="s0"><div class="s-eye">Your Daily</div><div class="s-big" style="font-size:5.5rem;background:linear-gradient(135deg,#fff,var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">REPLAY</div><div class="s-big-lbl">Here's your music story today ↓</div></div>`);

  if(topA)slides.push(`<div class="slide sl2" id="s${slides.length}"><div class="s-eye">Your #1 Artist Right Now</div><img class="s-aimg" src="${topA.images?.[1]?.url||topA.images?.[0]?.url||''}" alt=""/><div class="s-main">${topA.name}</div><div class="s-sub">You simply can't stop listening</div><div class="s-chips">${(topA.genres||[]).slice(0,3).map(g=>`<span class="s-chip">${g}</span>`).join('')}</div></div>`);

  if(top)slides.push(`<div class="slide sl3" id="s${slides.length}"><div class="s-eye">Your #1 Track Right Now</div><img class="s-tart" src="${top.album?.images?.[1]?.url||''}" alt=""/><div class="s-main">${top.name}</div><div class="s-sub">${top.artists?.map(x=>x.name).join(', ')||''}</div><div class="s-tag">🔥 On repeat</div></div>`);

  slides.push(`<div class="slide sl4" id="s${slides.length}"><div class="s-picon">${pi}</div><div class="s-eye">Your Music Personality</div><div class="s-pname">${pn}</div><div class="s-pdesc">${pd}</div></div>`);

  if(ug.length)slides.push(`<div class="slide sl5" id="s${slides.length}"><div class="s-eye">Your Sound</div><div class="s-main" style="font-size:2.2rem;margin-bottom:1rem;">Your Genres</div><div class="s-chips">${ug.map(g=>`<span class="s-chip">${g}</span>`).join('')}</div><div class="s-sub" style="margin-top:1.2rem;">That's a whole vibe 🎶</div></div>`);

  if(t.length>=3)slides.push(`<div class="slide sl6" id="s${slides.length}"><div class="s-eye" style="margin-bottom:0.75rem;">Your Top 5 Tracks</div><div class="tti-list">${t.slice(0,5).map((tr,i)=>`<div class="tti"><div class="tti-n">${i+1}</div><img class="tti-img" src="${tr.album?.images?.[2]?.url||''}" alt=""/><div class="tti-info"><div class="tti-name">${tr.name}</div><div class="tti-art">${tr.artists?.map(x=>x.name).join(', ')||''}</div></div></div>`).join('')}</div></div>`);

  if(a.length>=3)slides.push(`<div class="slide sl7" id="s${slides.length}"><div class="s-eye" style="margin-bottom:0.75rem;">Your Top Artists</div><div class="tti-list">${a.slice(0,5).map((ar,i)=>`<div class="tti"><div class="tti-n">${i+1}</div><img class="tti-img r" src="${ar.images?.[2]?.url||ar.images?.[0]?.url||''}" alt=""/><div class="tti-info"><div class="tti-name">${ar.name}</div><div class="tti-art">${(ar.genres||[]).slice(0,1).join(', ')||'artist'}</div></div></div>`).join('')}</div></div>`);

  slides.push(`<div class="slide slf" id="s${slides.length}"><div style="font-size:3.5rem;margin-bottom:1rem;animation:scIn .5s both;">🎵</div><div class="s-main">That's your<br/>sound today</div><div class="s-sub" style="margin-top:0.6rem;">Come back tomorrow to log another day</div><button onclick="closeWrapped()" style="margin-top:2rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:14px;padding:0.9rem 2.2rem;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.02em;">Done ✓</button></div>`);

  return slides;
}

function openWrapped(){
  haptic('m');
  const slides=buildSlides();
  document.getElementById('wrappedScreen').style.display='block';
  document.getElementById('bnav').style.display='none';
  document.getElementById('progSegs').innerHTML=slides.map((_,i)=>`<div class="ps"><div class="psf" id="psf-${i}"></div></div>`).join('');
  document.getElementById('slidesWrap').innerHTML=slides.join('');
  si=0;showSlide(0);
}

function showSlide(idx){
  if(st)clearTimeout(st);
  const all=document.querySelectorAll('.slide');
  all.forEach((s,i)=>{s.classList.remove('active');const f=document.getElementById(`psf-${i}`);if(!f)return;if(i<idx){f.style.transition='none';f.style.width='100%';}else{f.style.transition='';f.style.width='0%';}});
  if(idx>=all.length){closeWrapped();return;}
  all[idx].classList.add('active');haptic('l');
  const f=document.getElementById(`psf-${idx}`);
  if(f){f.style.width='0%';setTimeout(()=>{f.style.transition='width 5s linear';f.style.width='100%';},50);}
  si=idx;st=setTimeout(()=>nextSlide(),5000);
}

function nextSlide(){const n=document.querySelectorAll('.slide').length;if(si+1>=n)closeWrapped();else showSlide(si+1);}
function prevSlide(){if(si>0)showSlide(si-1);}
function closeWrapped(){if(st)clearTimeout(st);document.getElementById('wrappedScreen').style.display='none';document.getElementById('bnav').style.display='flex';}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showPage(page){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+page);if(nb)nb.classList.add('active');
  ['homeScreen','diaryPage','statsPage'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('active');});
  haptic('l');
  if(page==='home')document.getElementById('homeScreen').classList.add('active');
  else if(page==='diary'){document.getElementById('diaryPage').classList.add('active');loadDiary();}
  else if(page==='stats'){document.getElementById('statsPage').classList.add('active');loadStats();}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

window.loginWithSpotify=loginWithSpotify;
window.saveToday=saveToday;
window.showPage=showPage;
window.openWrapped=openWrapped;
window.closeWrapped=closeWrapped;
window.nextSlide=nextSlide;
window.prevSlide=prevSlide;

// Always init on page load — don't block on Firebase
window.addEventListener('DOMContentLoaded', () => {
  // Give Firebase module 500ms to load, then init regardless
  if(window._fb) { init(); }
  else {
    const fbWait = setTimeout(() => init(), 500);
    window.addEventListener('fbReady', () => { clearTimeout(fbWait); init(); }, {once:true});
  }
});
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('SW registered'))
      .catch(e => console.log('SW error', e));
  });
}
