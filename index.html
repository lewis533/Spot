<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#050508"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Replay"/>
<title>Replay</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#050508;--card:#0f0f1a;--border:rgba(255,255,255,0.06);
  --b:#4f7fff;--bp:rgba(79,127,255,0.18);
  --p:#a855f7;--g:#22d3ee;
  --text:#f0f0ff;--muted:rgba(255,255,255,0.35);
  --glass:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.07);
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow:hidden;user-select:none;}

/* MESH */
#meshBg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbF linear infinite;}
@keyframes orbF{0%{transform:translate(0,0);}50%{transform:translate(20px,-30px);}100%{transform:translate(0,0);}}

/* SPLASH */
#splash{position:fixed;inset:0;background:#050508;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity 0.6s;}
#splash.out{opacity:0;pointer-events:none;}
.s-rings{position:relative;width:80px;height:80px;margin-bottom:1.25rem;}
.s-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:rP 1.5s ease-in-out infinite;}
.s-ring:nth-child(1){border-color:rgba(79,127,255,0.8);}
.s-ring:nth-child(2){inset:-8px;border-color:rgba(168,85,247,0.5);animation-delay:0.25s;}
.s-ring:nth-child(3){inset:-16px;border-color:rgba(34,211,238,0.3);animation-delay:0.5s;}
@keyframes rP{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.5;}}
.s-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.s-word{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:0.12em;background:linear-gradient(135deg,#fff,var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.s-bar{width:120px;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;margin-top:1.25rem;overflow:hidden;}
.s-fill{height:100%;background:linear-gradient(90deg,var(--b),var(--p));animation:sL 1.5s ease forwards;}
@keyframes sL{from{width:0;}to{width:100%;}}

/* SCREENS */
.screen{display:none;position:fixed;inset:0;flex-direction:column;z-index:1;}
.screen.active{display:flex;}

/* LOGIN */
#loginScreen{align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(79,127,255,0.08),transparent);}
.login-card{background:rgba(10,10,18,0.9);border:1px solid var(--gb);border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:100%;backdrop-filter:blur(20px);}
.login-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--b),var(--p));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(79,127,255,0.35);}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.08em;background:linear-gradient(135deg,#fff,var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.6rem;}
.login-sub{font-size:0.83rem;color:var(--muted);line-height:1.7;margin-bottom:2rem;}
.btn-sp{width:100%;padding:1rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:14px;font-weight:700;font-size:0.92rem;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:transform 0.2s,box-shadow 0.2s;}
.btn-sp:active{transform:scale(0.98);}
.btn-sp svg{width:20px;height:20px;fill:#fff;}

/* TOPBAR */
.topbar{padding:2.5rem 1.25rem 0.75rem;}
.topbar-row{display:flex;align-items:flex-start;justify-content:space-between;}
.tb-greet{font-size:0.65rem;font-weight:700;color:var(--b);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:0.15rem;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.03em;line-height:1;}
.tb-date{font-size:0.68rem;color:var(--muted);margin-top:0.15rem;}
.tb-av{width:38px;height:38px;border-radius:12px;background:var(--bp);border:2px solid var(--b);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:var(--b);cursor:pointer;flex-shrink:0;object-fit:cover;}

/* SCROLL */
.sc{flex:1;overflow-y:auto;padding-bottom:85px;}
.sc::-webkit-scrollbar{display:none;}

/* QUOTE */
.quote{margin:0.75rem 1.25rem;padding:0.85rem 1rem;background:linear-gradient(135deg,rgba(79,127,255,0.07),rgba(168,85,247,0.07));border:1px solid var(--gb);border-radius:14px;font-size:0.78rem;color:rgba(255,255,255,0.5);font-style:italic;line-height:1.5;}
.quote cite{font-style:normal;font-size:0.66rem;color:var(--muted);display:block;margin-top:0.2rem;}

/* TODAY CARD */
.today-card{margin:0 1.25rem 1rem;border-radius:20px;overflow:hidden;position:relative;min-height:185px;cursor:pointer;}
.tc-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0d1033,#1a0d33);}
.tc-blur{position:absolute;inset:-10%;width:120%;height:120%;background-size:cover;background-position:center;opacity:0.2;filter:blur(30px) saturate(2);}
.tc-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,8,0.92),transparent 55%);}
.tc-body{position:relative;z-index:2;padding:1.25rem;}
.tc-pill{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(79,127,255,0.18);border:1px solid rgba(79,127,255,0.25);border-radius:50px;padding:0.22rem 0.7rem;font-size:0.6rem;font-weight:700;color:var(--b);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.85rem;}
.tc-dot{width:5px;height:5px;background:var(--b);border-radius:50%;animation:dot 1.5s ease infinite;}
@keyframes dot{0%,100%{opacity:1;}50%{opacity:0.2;}}
.tc-row{display:flex;align-items:center;gap:0.9rem;margin-bottom:0.85rem;}
.tc-art{width:58px;height:58px;border-radius:10px;object-fit:cover;background:#1a1a2e;flex-shrink:0;}
.tc-name{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:0.02em;line-height:1;}
.tc-sub{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:0.15rem;}
.tc-btn{display:inline-flex;align-items:center;gap:0.4rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;font-weight:700;font-size:0.72rem;padding:0.5rem 1rem;border-radius:50px;border:none;cursor:pointer;}

/* SAVE */
.save-wrap{padding:0 1.25rem 0.75rem;}
.btn-save{width:100%;padding:0.95rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:14px;font-weight:700;font-size:0.9rem;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;}
.btn-save:disabled{opacity:0.4;cursor:default;}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin:0 1.25rem 1rem;}
.metric{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:0.9rem;text-align:center;backdrop-filter:blur(10px);}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;background:linear-gradient(135deg,var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.metric-lbl{font-size:0.6rem;color:var(--muted);margin-top:0.1rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}

/* PERSONALITY */
.ps-card{margin:0 1.25rem 1rem;border-radius:16px;overflow:hidden;position:relative;padding:1.2rem;}
.ps-bg{position:absolute;inset:0;}
.ps-body{position:relative;z-index:1;}
.ps-eye{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:0.3rem;}
.ps-ico{font-size:2rem;margin-bottom:0.3rem;}
.ps-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.03em;line-height:1;}
.ps-desc{font-size:0.76rem;color:rgba(255,255,255,0.55);margin-top:0.3rem;line-height:1.5;}

/* ON THIS DAY */
.otd{margin:0 1.25rem 1rem;background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:0.9rem;backdrop-filter:blur(10px);}
.otd-eye{font-size:0.6rem;font-weight:700;color:var(--g);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.55rem;}
.otd-row{display:flex;align-items:center;gap:0.7rem;}
.otd-art{width:40px;height:40px;border-radius:7px;object-fit:cover;background:var(--card);flex-shrink:0;}
.otd-name{font-weight:600;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.otd-sub{font-size:0.7rem;color:var(--muted);margin-top:0.1rem;}

/* SECTIONS */
.sec{padding:0 1.25rem 1rem;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.05em;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.45rem;}
.sec-dot{width:5px;height:5px;border-radius:50%;background:linear-gradient(135deg,var(--b),var(--p));flex-shrink:0;}

/* TRACK ROWS */
.tlist{display:flex;flex-direction:column;gap:0.4rem;}
.tr{display:flex;align-items:center;gap:0.8rem;padding:0.65rem;border-radius:12px;background:var(--glass);border:1px solid var(--gb);backdrop-filter:blur(8px);}
.tr-n{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;color:var(--muted);width:16px;text-align:center;flex-shrink:0;}
.tr-img{width:42px;height:42px;border-radius:9px;object-fit:cover;background:var(--card);flex-shrink:0;}
.tr-img.r{border-radius:50%;}
.tr-meta{flex:1;min-width:0;}
.tr-name{font-weight:600;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-sub{font-size:0.7rem;color:var(--muted);margin-top:0.08rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-btn{width:28px;height:28px;background:var(--bp);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
.tr-btn svg{width:11px;height:11px;stroke:var(--b);fill:none;stroke-width:2.5;}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,8,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.7rem 0;gap:0.2rem;background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.57rem;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s;}
.nb svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;}
.nb.active{color:var(--b);}

/* DIARY */
#diaryPage{overflow-y:auto;padding-bottom:85px;}
#diaryPage::-webkit-scrollbar{display:none;}
.diary-entry{margin:0 1.25rem 0.7rem;background:var(--glass);border:1px solid var(--gb);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px);}
.de-head{padding:0.65rem 1rem;border-bottom:1px solid var(--border);font-size:0.65rem;font-weight:700;color:var(--b);letter-spacing:0.08em;text-transform:uppercase;}
.de-body{display:flex;align-items:center;gap:0.85rem;padding:0.85rem 1rem;}
.de-art{width:48px;height:48px;border-radius:9px;object-fit:cover;background:var(--card);flex-shrink:0;}
.de-info{flex:1;min-width:0;}
.de-track{font-weight:700;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.de-sub{font-size:0.7rem;color:var(--muted);margin-top:0.1rem;}
.de-open{width:28px;height:28px;background:var(--bp);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
.de-open svg{width:11px;height:11px;stroke:var(--b);fill:none;stroke-width:2.5;}

/* STATS */
#statsPage{overflow-y:auto;padding-bottom:85px;}
#statsPage::-webkit-scrollbar{display:none;}
.stat-sec{padding:0 1.25rem 1.4rem;}
.stat-sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.05em;margin-bottom:0.9rem;}
.gchart{display:flex;flex-direction:column;gap:0.6rem;}
.gcr{display:flex;align-items:center;gap:0.7rem;}
.gcr-name{font-size:0.73rem;font-weight:600;width:82px;flex-shrink:0;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gcr-track{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.gcr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--b),var(--p));width:0%;transition:width 1.4s cubic-bezier(.16,1,.3,1);}
.gcr-pct{font-size:0.67rem;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}
.llist,.dlist{display:flex;flex-direction:column;gap:0.45rem;}
.li,.di{background:var(--glass);border:1px solid var(--gb);border-radius:13px;padding:0.85rem;display:flex;align-items:center;gap:0.85rem;backdrop-filter:blur(8px);}
.li-img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--card);flex-shrink:0;}
.di-art{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--card);flex-shrink:0;}
.li-info,.di-info{flex:1;min-width:0;}
.li-name,.di-name{font-weight:700;font-size:0.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub,.di-sub{font-size:0.7rem;color:var(--muted);margin-top:0.08rem;}
.li-badge{display:inline-block;border-radius:50px;padding:0.12rem 0.55rem;font-size:0.58rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:0.2rem;}
.li-rank{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--b);flex-shrink:0;}
.di-new{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#000;font-size:0.58rem;font-weight:800;padding:0.18rem 0.5rem;border-radius:4px;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0;}
.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:0.65rem;}
.badge{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:0.9rem;text-align:center;backdrop-filter:blur(8px);position:relative;}
.badge.on{border-color:rgba(79,127,255,0.3);background:rgba(79,127,255,0.06);}
.badge-ico{font-size:1.7rem;margin-bottom:0.35rem;display:block;}
.badge-name{font-size:0.65rem;font-weight:700;}
.badge-off{filter:grayscale(1);opacity:0.25;}
.badge-ck{position:absolute;top:5px;right:5px;width:15px;height:15px;background:var(--b);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.5rem;}
.mc{background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1.1rem;backdrop-filter:blur(10px);margin-bottom:0.65rem;}
.mc-month{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.05em;color:var(--b);margin-bottom:0.65rem;}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;}
.mc-val{font-weight:700;font-size:0.85rem;}
.mc-lbl{font-size:0.68rem;color:var(--muted);}
.tchart{background:var(--glass);border:1px solid var(--gb);border-radius:14px;padding:0.9rem;backdrop-filter:blur(10px);}
.tchart-bars{display:flex;align-items:flex-end;gap:0.35rem;height:70px;margin-bottom:0.4rem;}
.tb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.25rem;}
.tb-bar{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--b),var(--p));min-height:4px;}
.tb-lbl{font-size:0.55rem;color:var(--muted);white-space:nowrap;}

/* WRAPPED */
#wrappedScreen{display:none;position:fixed;inset:0;z-index:200;background:#000;overflow:hidden;}
.slide{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;overflow:hidden;}
.slide.active{display:flex;animation:sIn .5s cubic-bezier(.16,1,.3,1) both;}
@keyframes sIn{from{opacity:0;transform:scale(1.05);}to{opacity:1;transform:scale(1);}}
.sl1{background:radial-gradient(ellipse at 30% 70%,#1a0050,#050508 60%);}
.sl2{background:radial-gradient(ellipse at 70% 30%,#003322,#050508 60%);}
.sl3{background:radial-gradient(ellipse at 50% 80%,#330000,#050508 60%);}
.sl4{background:radial-gradient(ellipse at 20% 50%,#200040,#050508 60%);}
.sl5{background:radial-gradient(ellipse at 80% 50%,#003344,#050508 60%);}
.sl6{background:radial-gradient(ellipse at 50% 20%,#331a00,#050508 60%);}
.sl7{background:radial-gradient(ellipse at 40% 60%,#001a33,#050508 60%);}
.slf{background:linear-gradient(160deg,#0a0a12,#050508);}
.psegs{position:absolute;top:14px;left:1rem;right:1rem;display:flex;gap:3px;}
.pseg{flex:1;height:2px;background:rgba(255,255,255,0.15);border-radius:1px;overflow:hidden;}
.psf{height:100%;background:#fff;width:0%;transition:width 5s linear;border-radius:1px;}
.psf.done{width:100%;transition:none;}
.s-close{position:absolute;top:1.5rem;right:1rem;background:rgba(255,255,255,0.08);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.s-tl{position:absolute;left:0;top:0;bottom:0;width:40%;z-index:5;cursor:pointer;}
.s-tr{position:absolute;right:0;top:0;bottom:0;width:60%;z-index:5;cursor:pointer;}
.s-eye{font-size:0.63rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;opacity:0.45;margin-bottom:0.85rem;animation:fU .5s .2s both;}
.s-big{font-family:'Bebas Neue',sans-serif;font-size:6rem;line-height:0.85;letter-spacing:-0.02em;animation:scIn .5s .1s cubic-bezier(.16,1,.3,1) both;}
.s-lbl{font-size:0.9rem;font-weight:300;opacity:0.5;margin-top:0.45rem;animation:fU .5s .3s both;}
.s-aimg{width:148px;height:148px;border-radius:50%;object-fit:cover;margin:0 auto 1.3rem;box-shadow:0 16px 50px rgba(0,0,0,0.7);animation:scIn .5s .1s cubic-bezier(.16,1,.3,1) both;}
.s-timg{width:162px;height:162px;border-radius:16px;object-fit:cover;margin:0 auto 1.3rem;box-shadow:0 16px 50px rgba(0,0,0,0.7);animation:scIn .5s .1s cubic-bezier(.16,1,.3,1) both;}
.s-main{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:0.02em;line-height:1;animation:fU .5s .2s both;}
.s-sub{font-size:0.83rem;opacity:0.5;margin-top:0.4rem;animation:fU .5s .35s both;}
.s-tag{display:inline-block;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.17);border-radius:50px;padding:0.28rem 0.8rem;font-size:0.72rem;font-weight:600;margin-top:0.85rem;animation:fU .5s .45s both;}
.s-chips{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin-top:0.85rem;animation:fU .5s .4s both;}
.s-chip{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:50px;padding:0.26rem 0.72rem;font-size:0.7rem;font-weight:500;text-transform:capitalize;}
.s-pico{font-size:3.2rem;margin-bottom:0.65rem;animation:scIn .5s .1s both;}
.s-pname{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:0.03em;animation:fU .5s .2s both;}
.s-pdesc{font-size:0.8rem;opacity:0.52;margin-top:0.38rem;line-height:1.6;max-width:265px;animation:fU .5s .35s both;}
.tti-list{width:100%;text-align:left;animation:fU .5s .2s both;}
.tti{display:flex;align-items:center;gap:0.7rem;padding:0.48rem 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.tti:last-child{border:none;}
.tti-n{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:rgba(255,255,255,0.2);width:18px;flex-shrink:0;}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.cp{position:fixed;pointer-events:none;z-index:9998;border-radius:2px;animation:cF linear forwards;}

<script>
// ── CONFIG ──
var CID = '9bfa94ea5acd434e91bec6502a854a53';
var RU  = 'https://lewspot.vercel.app';
var SC  = 'user-read-private user-read-email user-top-read user-read-currently-playing user-read-recently-played';
var token = null, user = null, todaySnap = null, slideIdx = 0, slideTimer = null, slideData = {};

// ── FIREBASE ──
var db = null;
try {
  var fbCfg = {apiKey:'AIzaSyDpIPIum4KqI0beCHeDpr8ODXzbwASNFo4',authDomain:'lewspot-3d360.firebaseapp.com',databaseURL:'https://lewspot-3d360-default-rtdb.firebaseio.com',projectId:'lewspot-3d360',storageBucket:'lewspot-3d360.firebasestorage.app',messagingSenderId:'1039820020106',appId:'1:1039820020106:web:a37be7343e6e114f6bd073'};
  if (!firebase.apps.length) firebase.initializeApp(fbCfg);
  db = firebase.database();
} catch(e) { console.warn('Firebase:', e); }

function fbSet(path, data) {
  if (!db) return Promise.resolve();
  return db.ref(path).set(data);
}
function fbGet(path) {
  if (!db) return Promise.resolve(null);
  return db.ref(path).once('value').then(function(s){ return s.exists() ? s.val() : null; });
}

// ── PKCE ──
// ── AUTH ──
function loginWithSpotify() {
  var state = Math.random().toString(36).substring(2);
  localStorage.setItem('rp_state', state);
  var url = 'https://accounts.spotify.com/authorize' +
    '?response_type=token' +
    '&client_id=' + CID +
    '&scope=' + encodeURIComponent(SC) +
    '&redirect_uri=' + encodeURIComponent(RU) +
    '&state=' + state;
  window.location.href = url;
}

function logout() {
  localStorage.removeItem('rp_token');
  localStorage.removeItem('rp_expiry');
  localStorage.removeItem('rp_refresh');
  token = null; user = null;
  showScreen('loginScreen');
}

// ── SPOTIFY FETCH ──
function spt(url) {
  console.log('spt call:', url, '| token:', token ? token.substring(0,20)+'...' : 'NULL');
  if(!token) return Promise.resolve(null);
  return fetch('https://api.spotify.com/v1' + url, {headers:{Authorization:'Bearer '+token}})
    .then(function(r){ 
      console.log('spt response:', url, r.status);
      if(!r.ok){ 
        console.log('API error:', r.status, url);
        if(r.status===401){ 
          // Token expired - clear and show login
          localStorage.removeItem('rp_token');
          localStorage.removeItem('rp_expiry');
          token = null; user = null;
          showScreen('loginScreen');
        } 
        return null; 
      } 
      return r.json(); 
    })
    .catch(function(e){ console.log('spt error:', e); return null; });
}

// ── HELPERS ──
function todayKey() {
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function greetStr() {
  var h=new Date().getHours();
  return h<5?'Late night 🌙':h<12?'Good morning ☀️':h<17?'Good afternoon 🌤':h<21?'Good evening 🌆':'Night owl 🌙';
}
function fmtShort(k) {
  var parts=k.split('-'), dt=new Date(parts[0],parts[1]-1,parts[2]);
  if(k===todayKey()) return 'Today';
  var yest=new Date(); yest.setDate(yest.getDate()-1);
  if(dt.toDateString()===yest.toDateString()) return 'Yesterday';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtMonth(k) {
  var parts=k.split('-');
  return new Date(parts[0],parts[1]-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function countUp(el, target) {
  var start=null;
  function step(ts){ if(!start) start=ts; var p=Math.min((ts-start)/1200,1),e=1-Math.pow(1-p,4); el.textContent=Math.floor(e*target); if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}
function haptic(t) { if(navigator.vibrate) navigator.vibrate(t==='m'?25:8); }
function showToast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');}); document.getElementById(id).classList.add('active'); }

var QUOTES=[
  {q:"Music gives a soul to the universe.",a:"Plato"},
  {q:"One good thing about music — when it hits you, you feel no pain.",a:"Bob Marley"},
  {q:"Without music, life would be a mistake.",a:"Nietzsche"},
  {q:"Where words fail, music speaks.",a:"H.C. Andersen"},
  {q:"Music is the universal language of mankind.",a:"Longfellow"},
];
var PERSONA={
  "hip hop":["The Hypebeast","You live for the beat and the bars.","🔥"],
  "afrobeats":["The Vibe Conductor","Every room becomes a dance floor.","🥁"],
  "pop":["The Chart Climber","Always on the pulse.","⚡"],
  "r&b":["The Smooth Soul","Emotion is your language.","🌊"],
  "electronic":["The Night Architect","You build worlds with sound.","🌐"],
  "rock":["The Voltage Seeker","Raw, real, unfiltered.","🎸"],
  "default":["The Free Spirit","Your taste can't be boxed.","🎵"],
};
var BADGES=[
  {id:'first',icon:'🎵',name:'First Log',req:1},
  {id:'week',icon:'🔥',name:'7 Day Streak',req:7,streak:true},
  {id:'month',icon:'📅',name:'30 Days',req:30},
  {id:'century',icon:'💯',name:'100 Days',req:100},
  {id:'explorer',icon:'🌍',name:'Explorer',genres:5},
  {id:'loyal',icon:'👑',name:'Loyal Fan',loyal:true},
];
function getPersona(genres) {
  for(var i=0;i<genres.length;i++) for(var k in PERSONA) if(genres[i].includes(k)) return PERSONA[k];
  return PERSONA.default;
}

// ── INIT ──
function init() {
  // Always hide splash at 1.5s
  setTimeout(function(){ document.getElementById('splash').classList.add('out'); }, 1500);

  // Read token from URL hash (implicit grant)
  var hash = window.location.hash.substring(1);
  var hashParams = new URLSearchParams(hash);
  var hashToken = hashParams.get('access_token');
  if(hashToken) {
    token = hashToken;
    localStorage.setItem('rp_token', token);
    localStorage.setItem('rp_expiry', Date.now() + 3500000);
    window.history.replaceState(null, '', window.location.pathname);
  } else {
    token = localStorage.getItem('rp_token');
    // Check if token is expired
    var expiry = localStorage.getItem('rp_expiry');
    if(expiry && Date.now() > parseInt(expiry)) {
      console.log('Token expired, clearing');
      localStorage.removeItem('rp_token');
      localStorage.removeItem('rp_expiry');
      token = null;
    }
  }
  afterAuth();
}

function refreshToken(callback) {
  var refresh = localStorage.getItem('rp_refresh');
  if(!refresh){ callback(false); return; }
  fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'grant_type=refresh_token&refresh_token=' + refresh + '&client_id=' + CID
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.access_token){
      token = data.access_token;
      localStorage.setItem('rp_token', token);
      localStorage.setItem('rp_expiry', Date.now() + 3500000);
      if(data.refresh_token) localStorage.setItem('rp_refresh', data.refresh_token);
      callback(true);
    } else { callback(false); }
  })
  .catch(function(){ callback(false); });
}

function autoLogin() {
  // Silently redirect to Spotify login - user won't need to tap button
  var state = Math.random().toString(36).substring(2);
  localStorage.setItem('rp_state', state);
  var url = 'https://accounts.spotify.com/authorize' +
    '?response_type=token' +
    '&client_id=' + CID +
    '&scope=' + encodeURIComponent(SC) +
    '&redirect_uri=' + encodeURIComponent(RU) +
    '&state=' + state +
    '&show_dialog=false';
  window.location.href = url;
}

function afterAuth() {
  setTimeout(function(){
    if(!token){ 
      // Try refresh token before giving up
      var refresh = localStorage.getItem('rp_refresh');
      if(refresh){
        refreshToken(function(ok){
          if(ok){ showScreen('homeScreen'); setupHome(); loadUser(); }
          else { showScreen('loginScreen'); }
        });
      } else {
        showScreen('loginScreen'); 
      }
      return; 
    }
    // Check if token expired
    var expiry = localStorage.getItem('rp_expiry');
    if(expiry && Date.now() > parseInt(expiry)){
      refreshToken(function(ok){
        if(ok){ showScreen('homeScreen'); setupHome(); loadUser(); }
        else { localStorage.removeItem('rp_token'); showScreen('loginScreen'); }
      });
      return;
    }
    showScreen('homeScreen');
    setupHome();
    loadUser();
  }, 1600);
}

function setupHome(){
  document.getElementById('greet').textContent = greetStr();
  document.getElementById('hDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var q = QUOTES[new Date().getDate() % QUOTES.length];
  document.getElementById('quote').innerHTML = '"'+q.q+'" <cite>— '+q.a+'</cite>';
}

// ── LOAD USER ──
function loadUser() {
  console.log('loadUser called, token:', token ? 'exists' : 'NULL');
  spt('/me').then(function(d){
    console.log('spt /me result:', d ? 'got user: '+d.id : 'NULL - token may be expired');
    if(!d) {
      // Token expired - force logout and show login
      console.log('No user data - clearing token');
      localStorage.removeItem('rp_token');
      token = null;
      showScreen('loginScreen');
      return;
    }
    user = d;
    var name = d.display_name || d.id;
    var av = d.images && d.images[0] ? d.images[0].url : '';
    var el = document.getElementById('av');
    if(av){ var img=document.createElement('img'); img.className='tb-av'; img.src=av; img.id='av'; el.replaceWith(img); }
    else { el.textContent = name[0].toUpperCase(); }
    loadHome();
  });
}

// ── LOAD HOME ──
function loadHome() {
  var key = todayKey();
  // Show timeout message if loading takes more than 6 seconds
  var loadTimeout = setTimeout(function(){
    var tc = document.getElementById('todayCard');
    if(tc && tc.querySelector('.spinner')){
      tc.innerHTML = '<div style="text-align:center;padding:2rem 1.25rem;"><div style="font-size:2.5rem;margin-bottom:0.75rem;">🎵</div><div style="font-weight:700;font-size:0.95rem;margin-bottom:0.5rem;color:#f0f0ff;">No music yet</div><div style="color:rgba(255,255,255,0.35);font-size:0.82rem;line-height:1.7;">Open Spotify and play some songs.<br/>Come back and refresh — your music<br/>will appear here.</div></div>';
      document.getElementById('saveBtn').disabled = true;
    }
  }, 6000);

  Promise.all([
    spt('/me/top/tracks?limit=10&time_range=short_term'),
    spt('/me/top/artists?limit=10&time_range=short_term'),
    spt('/me/player/recently-played?limit=50'),
    user ? fbGet('replay/'+user.id+'/'+key) : Promise.resolve(null)
  ]).then(function(results){
    clearTimeout(loadTimeout);
    var tracks=results[0], artists=results[1], recent=results[2], existing=results[3];

    // Deduplicated recent tracks
    var seen={}, recentTracks=[];
    if(recent && recent.items) {
      recent.items.forEach(function(i){ if(!seen[i.track.id]){seen[i.track.id]=1;recentTracks.push(i.track);} });
    }
    recentTracks = recentTracks.slice(0,10);

    var tt = (tracks && tracks.items && tracks.items[0]) || recentTracks[0] || null;
    var ta = (artists && artists.items && artists.items[0]) || null;
    var isRecent = !(tracks && tracks.items && tracks.items.length);

    if(tt){
      todaySnap = {
        date: key,
        track: {name:tt.name, artist:tt.artists?tt.artists.map(function(a){return a.name;}).join(', '):'', art:(tt.album&&tt.album.images&&tt.album.images[1]?tt.album.images[1].url:tt.album&&tt.album.images&&tt.album.images[0]?tt.album.images[0].url:''), url:tt.external_urls?tt.external_urls.spotify:''},
        artist: ta ? {name:ta.name, art:(ta.images&&ta.images[1]?ta.images[1].url:ta.images&&ta.images[0]?ta.images[0].url:''), url:ta.external_urls?ta.external_urls.spotify:'', genres:ta.genres?ta.genres.slice(0,3):[]} : null,
        savedAt: Date.now()
      };
      renderTodayCard(todaySnap, !!existing);
    } else {
      document.getElementById('todayCard').innerHTML = '<div style="text-align:center;padding:2rem 1.25rem;"><div style="font-size:2.5rem;margin-bottom:0.75rem;">🎵</div><div style="font-weight:700;font-size:0.95rem;margin-bottom:0.5rem;">No music yet</div><div style="color:var(--muted);font-size:0.82rem;line-height:1.7;">Open Spotify and play some songs.<br/>Come back and refresh — your music<br/>will appear here.</div></div>';
    }

    var btn = document.getElementById('saveBtn');
    btn.disabled = !!existing;
    btn.textContent = existing ? '✓ Already saved today' : "Save Today's Snapshot";

    // Tracks list
    var showTracks = (tracks && tracks.items && tracks.items.length) ? tracks.items : recentTracks;
    if(showTracks.length){
      document.getElementById('secTracks').style.display='block';
      document.getElementById('trackList').innerHTML = showTracks.slice(0,10).map(function(t,i){
        var art = t.album&&t.album.images&&t.album.images[2]?t.album.images[2].url:t.album&&t.album.images&&t.album.images[0]?t.album.images[0].url:'';
        var artist = t.artists?t.artists.map(function(a){return a.name;}).join(', '):'';
        var url = t.external_urls?t.external_urls.spotify:'#';
        return '<div class="tr"><div class="tr-n">'+(i+1)+'</div><img class="tr-img" src="'+art+'" alt=""/><div class="tr-meta"><div class="tr-name">'+t.name+'</div><div class="tr-sub">'+artist+(isRecent?' &middot; <span style="color:var(--b);font-size:0.6rem;font-weight:700;">RECENT</span>':'')+'</div></div><a class="tr-btn" href="'+url+'" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>';
      }).join('');
    }

    // Artists list
    var showArtists = (artists && artists.items && artists.items.length) ? artists.items : [];
    if(!showArtists.length && recentTracks.length){
      var aMap={};
      recentTracks.forEach(function(t){ if(t.artists) t.artists.forEach(function(a){ if(!aMap[a.name]) aMap[a.name]={name:a.name,images:[],genres:[],external_urls:a.external_urls||{}}; }); });
      showArtists = Object.values(aMap).slice(0,5);
    }
    if(showArtists.length){
      document.getElementById('secArtists').style.display='block';
      document.getElementById('artistList').innerHTML = showArtists.slice(0,5).map(function(a,i){
        var img = a.images&&a.images[2]?a.images[2].url:a.images&&a.images[0]?a.images[0].url:'';
        var url = a.external_urls?a.external_urls.spotify:'#';
        return '<div class="tr"><div class="tr-n">'+(i+1)+'</div><img class="tr-img r" src="'+img+'" alt=""/><div class="tr-meta"><div class="tr-name">'+a.name+'</div><div class="tr-sub">'+(a.genres&&a.genres.length?a.genres.slice(0,2).join(', '):'artist')+'</div></div><a class="tr-btn" href="'+url+'" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>';
      }).join('');
    }

    // Personality
    if(artists && artists.items && artists.items.length){
      var genres = artists.items.reduce(function(acc,a){ return acc.concat(a.genres||[]); },[]);
      var p = getPersona(genres);
      var bgs=[['#0d0033','#1a0044'],['#001a00','#002a00'],['#1a0000','#2e0000'],['#001a1a','#002e2e']];
      var bg = bgs[Math.floor(Math.random()*bgs.length)];
      document.getElementById('psWrap').style.display='block';
      document.getElementById('psWrap').innerHTML='<div class="ps-card"><div class="ps-bg" style="background:linear-gradient(135deg,'+bg[0]+','+bg[1]+')"></div><div class="ps-body"><div class="ps-eye">Your Music Personality</div><div class="ps-ico">'+p[2]+'</div><div class="ps-name">'+p[0]+'</div><div class="ps-desc">'+p[1]+'</div></div></div>';
    }

    slideData = {tracks: showTracks, artists: showArtists};

    // Diary stats
    if(user){
      fbGet('replay/'+user.id).then(function(allData){
        if(!allData) return;
        var entries = Object.values(allData);
        var days = entries.length;
        var streak=0, td=new Date();
        for(var i=0;i<365;i++){
          var d=new Date(td); d.setDate(td.getDate()-i);
          var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
          if(allData[k]) streak++; else break;
        }
        document.getElementById('metrics').style.display='grid';
        setTimeout(function(){ countUp(document.getElementById('mDays'),days); countUp(document.getElementById('mStreak'),streak); countUp(document.getElementById('mMins'),days*32); },300);
        // On this day
        var wk=new Date(); wk.setDate(wk.getDate()-7);
        var wkKey=wk.getFullYear()+'-'+String(wk.getMonth()+1).padStart(2,'0')+'-'+String(wk.getDate()).padStart(2,'0');
        if(allData[wkKey] && allData[wkKey].track){
          var e=allData[wkKey];
          document.getElementById('otdWrap').style.display='block';
          document.getElementById('otdWrap').innerHTML='<div class="otd"><div class="otd-eye">📅 One week ago today</div><div class="otd-row"><img class="otd-art" src="'+e.track.art+'" alt=""/><div><div class="otd-name">'+e.track.name+'</div><div class="otd-sub">'+e.track.artist+'</div></div></div></div>';
        }
      });
    }
  });
}

function renderTodayCard(s, saved) {
  var art = s.track ? s.track.art : '';
  document.getElementById('todayCard').innerHTML =
    '<div class="today-card" id="tcBtn">'+
      '<div class="tc-bg"></div>'+
      '<div class="tc-blur" style="background-image:url(\''+art+'\')"></div>'+
      '<div class="tc-grad"></div>'+
      '<div class="tc-body">'+
        '<div class="tc-pill"><span class="tc-dot"></span>Today\'s Top</div>'+
        (s.track ? '<div class="tc-row"><img class="tc-art" src="'+s.track.art+'" alt=""/><div><div class="tc-name">'+s.track.name+'</div><div class="tc-sub">'+s.track.artist+'</div></div></div>' : '')+
        '<button class="tc-btn">▶ Watch Your Replay</button>'+
      '</div>'+
    '</div>';

}

// ── SAVE ──
function saveToday() {
  if(!user || !todaySnap) return;
  haptic('m');
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  fbSet('replay/'+user.id+'/'+todaySnap.date, todaySnap).then(function(){
    btn.textContent = '✓ Saved!';
    launchConfetti(); haptic('m');
    showToast('Snapshot saved 🎵');
    fbGet('replay/'+user.id).then(function(allData){
      if(allData){ var days=Object.values(allData).length; document.getElementById('metrics').style.display='grid'; countUp(document.getElementById('mDays'),days); }
    });
  });
}

function launchConfetti() {
  var cols=['#4f7fff','#a855f7','#22d3ee','#f97316','#22c55e','#fff'];
  for(var i=0;i<60;i++){
    setTimeout(function(){
      var e=document.createElement('div'); e.className='cp';
      e.style.cssText='left:'+Math.random()*100+'vw;background:'+cols[Math.floor(Math.random()*cols.length)]+';width:'+(5+Math.random()*7)+'px;height:'+(5+Math.random()*7)+'px;animation-duration:'+(1.5+Math.random()*2.5)+'s;border-radius:'+(Math.random()>.5?'50%':'2px')+';';
      document.body.appendChild(e); setTimeout(function(){e.remove();},4000);
    }, i*25);
  }
}

// ── DIARY ──
function loadDiary() {
  var el = document.getElementById('diaryList');
  if(!user){ el.innerHTML='<div class="loading"><div class="spinner"></div></div>'; setTimeout(function(){ if(user) loadDiary(); else el.innerHTML='<div class="empty">Could not load. Try refreshing.</div>'; },2000); return; }
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  fbGet('replay/'+user.id).then(function(data){
    if(!data){ el.innerHTML='<div class="empty">No entries yet.<br/>Save today\'s snapshot to start.</div>'; return; }
    var entries = Object.values(data).sort(function(a,b){return b.date.localeCompare(a.date);});
    document.getElementById('dCount').textContent = entries.length+' entr'+(entries.length===1?'y':'ies');
    el.innerHTML = entries.map(function(e){
      return '<div class="diary-entry"><div class="de-head">'+fmtShort(e.date)+' · '+e.date+'</div>'+(e.track?'<div class="de-body"><img class="de-art" src="'+e.track.art+'" alt=""/><div class="de-info"><div class="de-track">'+e.track.name+'</div><div class="de-sub">'+e.track.artist+(e.artist?' · '+e.artist.name:'')+'</div></div><a class="de-open" href="'+e.track.url+'" target="_blank"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>':'')+'</div>';
    }).join('');
  });
}

// ── STATS ──
function loadStats() {
  var el = document.getElementById('statsContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  Promise.all([
    spt('/me/top/artists?limit=20&time_range=medium_term'),
    spt('/me/top/artists?limit=20&time_range=short_term'),
    spt('/me/top/tracks?limit=20&time_range=short_term'),
    spt('/me/top/tracks?limit=20&time_range=medium_term'),
  ]).then(function(res){
    var arts=res[0], sArts=res[1], sTrks=res[2], mTrks=res[3];
    var ai = arts&&arts.items ? arts.items : [];
    var sAn = new Set((sArts&&sArts.items?sArts.items:[]).map(function(a){return a.name;}));
    var mTn = new Set((mTrks&&mTrks.items?mTrks.items:[]).map(function(t){return t.name;}));

    // Genre chart
    var gc={};
    ai.forEach(function(a){(a.genres||[]).forEach(function(g){gc[g]=(gc[g]||0)+1;});});
    var sg=Object.entries(gc).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
    var mg=sg.length?sg[0][1]:1;
    var genreHTML=sg.length?'<div class="stat-sec"><div class="stat-sec-title">🎨 Your Genres</div><div class="gchart">'+sg.map(function(x){return'<div class="gcr"><div class="gcr-name">'+x[0]+'</div><div class="gcr-track"><div class="gcr-fill" data-w="'+Math.round(x[1]/mg*100)+'"></div></div><div class="gcr-pct">'+Math.round(x[1]/mg*100)+'%</div></div>';}).join('')+'</div></div>':'';

    // Loyalty
    var loyalHTML=ai.length?'<div class="stat-sec"><div class="stat-sec-title">🏆 Artist Loyalty</div><div class="llist">'+ai.slice(0,5).map(function(a,i){
      var loyal=sAn.has(a.name);
      var img=a.images&&a.images[2]?a.images[2].url:a.images&&a.images[0]?a.images[0].url:'';
      return'<div class="li"><img class="li-img" src="'+img+'" alt=""/><div class="li-info"><div class="li-name">'+a.name+'</div><div class="li-sub">'+((a.genres&&a.genres[0])||'artist')+'</div><span class="li-badge" style="'+(loyal?'background:rgba(79,127,255,0.15);color:var(--b);border:1px solid rgba(79,127,255,0.3)':'background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)')+'">'+( loyal?'🔥 Still on top':'📉 Slipping')+'</span></div><div class="li-rank">#'+(i+1)+'</div></div>';
    }).join('')+'</div></div>':'';

    // Discoveries
    var nd=(sTrks&&sTrks.items?sTrks.items:[]).filter(function(t){return !mTn.has(t.name);}).slice(0,5);
    var discHTML=nd.length?'<div class="stat-sec"><div class="stat-sec-title">✨ New Discoveries</div><div class="dlist">'+nd.map(function(t){
      var img=t.album&&t.album.images&&t.album.images[2]?t.album.images[2].url:'';
      var artist=t.artists?t.artists.map(function(a){return a.name;}).join(', '):'';
      return'<div class="di"><img class="di-art" src="'+img+'" alt=""/><div class="di-info"><div class="di-name">'+t.name+'</div><div class="di-sub">'+artist+'</div></div><span class="di-new">NEW</span></div>';
    }).join('')+'</div></div>':'<div class="stat-sec"><div class="stat-sec-title">✨ New Discoveries</div><div style="color:var(--muted);font-size:0.82rem;padding:0.5rem 0;">Keep listening — new tracks will appear here.</div></div>';

    var trendHTML='', badgeHTML='';
    if(user){
      fbGet('replay/'+user.id).then(function(allData){
        if(allData){
          // Trend
          var entries=Object.values(allData), monthly={};
          entries.forEach(function(e){ var mk=e.date?e.date.substring(0,7):null; if(mk&&e.track){monthly[mk]=monthly[mk]||[];monthly[mk].push(e.track.name);} });
          var months=Object.keys(monthly).sort().slice(-6);
          if(months.length>=2){
            var mx=Math.max.apply(null,months.map(function(m){return monthly[m].length;}));
            trendHTML='<div class="stat-sec"><div class="stat-sec-title">📈 Listening Trend</div><div class="tchart"><div class="tchart-bars">'+months.map(function(m){var cnt=monthly[m].length,h=Math.max(8,Math.round(cnt/mx*100));return'<div class="tb-wrap"><div class="tb-bar" style="height:'+h+'%"></div><div class="tb-lbl">'+m.substring(5)+'</div></div>';}).join('')+'</div></div></div>';
          }
          // Monthly recaps
          var rHTML=months.slice(-3).reverse().map(function(m){
            var ts=monthly[m]||[],freq={};
            ts.forEach(function(t){freq[t]=(freq[t]||0)+1;});
            var top=Object.entries(freq).sort(function(a,b){return b[1]-a[1];})[0];
            return'<div class="mc"><div class="mc-month">'+fmtMonth(m+'-01')+'</div><div class="mc-grid"><div><div class="mc-val">'+ts.length+'</div><div class="mc-lbl">Days logged</div></div><div><div class="mc-val" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+( top?top[0]:'—')+'</div><div class="mc-lbl">Top track</div></div></div></div>';
          }).join('');
          // Badges
          var days=entries.length, streak=0, td=new Date();
          for(var i=0;i<365;i++){var d=new Date(td);d.setDate(td.getDate()-i);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(allData[k])streak++;else break;}
          var uG=new Set(ai.reduce(function(acc,a){return acc.concat(a.genres||[]);},[]));
          badgeHTML='<div class="stat-sec"><div class="stat-sec-title">🏅 Achievements</div><div class="badges">'+BADGES.map(function(b){
            var u=b.streak?streak>=b.req:b.genres?uG.size>=b.genres:b.loyal?sAn.size>0:days>=b.req;
            return'<div class="badge '+(u?'on':'')+'"><span class="badge-ico '+(u?'':'badge-off')+'">'+b.icon+'</span><div class="badge-name" style="'+(u?'':'color:var(--muted)')+'">'+b.name+'</div>'+(u?'<div class="badge-ck">✓</div>':'')+'</div>';
          }).join('')+'</div></div>';
          el.innerHTML = genreHTML+(trendHTML||'')+(rHTML?'<div class="stat-sec"><div class="stat-sec-title">🗓 Monthly Recaps</div>'+rHTML+'</div>':'')+loyalHTML+discHTML+badgeHTML;
          setTimeout(function(){ document.querySelectorAll('.gcr-fill[data-w]').forEach(function(b){var w=b.getAttribute('data-w');b.style.width='0';setTimeout(function(){b.style.width=w+'%';},80);}); },150);
        } else {
          el.innerHTML = genreHTML+loyalHTML+discHTML;
          setTimeout(function(){ document.querySelectorAll('.gcr-fill[data-w]').forEach(function(b){var w=b.getAttribute('data-w');b.style.width='0';setTimeout(function(){b.style.width=w+'%';},80);}); },150);
        }
      });
    } else {
      el.innerHTML = genreHTML+loyalHTML+discHTML;
    }
  });
}

// ── WRAPPED ──
function buildSlides() {
  var t=slideData.tracks||[], a=slideData.artists||[];
  var top=t[0], topA=a[0];
  var genres=a.reduce(function(acc,x){return acc.concat(x.genres||[]);}, []);
  var p=getPersona(genres);
  var ug=[]; var seen={};
  genres.forEach(function(g){if(!seen[g]&&ug.length<5){seen[g]=1;ug.push(g);}});
  var slides=[];

  slides.push('<div class="slide sl1" id="s0"><div class="s-eye">Your Daily</div><div class="s-big" style="background:linear-gradient(135deg,#fff,var(--b),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">REPLAY</div><div class="s-lbl">Here\'s your music story today</div></div>');
  if(topA) slides.push('<div class="slide sl2" id="s'+(slides.length)+'"><div class="s-eye">Your #1 Artist</div><img class="s-aimg" src="'+(topA.images&&topA.images[1]?topA.images[1].url:topA.images&&topA.images[0]?topA.images[0].url:'')+'" alt=""/><div class="s-main">'+topA.name+'</div><div class="s-sub">You simply can\'t stop listening</div><div class="s-chips">'+(topA.genres||[]).slice(0,3).map(function(g){return'<span class="s-chip">'+g+'</span>';}).join('')+'</div></div>');
  if(top) slides.push('<div class="slide sl3" id="s'+(slides.length)+'"><div class="s-eye">Your #1 Track</div><img class="s-timg" src="'+(top.album&&top.album.images&&top.album.images[1]?top.album.images[1].url:'')+'" alt=""/><div class="s-main">'+top.name+'</div><div class="s-sub">'+(top.artists?top.artists.map(function(x){return x.name;}).join(', '):'')+' </div><div class="s-tag">🔥 On repeat</div></div>');
  slides.push('<div class="slide sl4" id="s'+(slides.length)+'"><div class="s-pico">'+p[2]+'</div><div class="s-eye">Your Music Personality</div><div class="s-pname">'+p[0]+'</div><div class="s-pdesc">'+p[1]+'</div></div>');
  if(ug.length) slides.push('<div class="slide sl5" id="s'+(slides.length)+'"><div class="s-eye">Your Sound</div><div class="s-main" style="font-size:2.2rem;margin-bottom:0.9rem;">Your Genres</div><div class="s-chips">'+ug.map(function(g){return'<span class="s-chip">'+g+'</span>';}).join('')+'</div><div class="s-sub" style="margin-top:1rem;">That\'s a whole vibe 🎶</div></div>');
  if(t.length>=3) slides.push('<div class="slide sl6" id="s'+(slides.length)+'"><div class="s-eye" style="margin-bottom:0.7rem;">Your Top 5 Tracks</div><div class="tti-list">'+t.slice(0,5).map(function(tr,i){return'<div class="tti"><div class="tti-n">'+(i+1)+'</div><img class="tti-img" src="'+(tr.album&&tr.album.images&&tr.album.images[2]?tr.album.images[2].url:'')+'" alt=""/><div class="tti-info"><div class="tti-name">'+tr.name+'</div><div class="tti-art">'+(tr.artists?tr.artists.map(function(x){return x.name;}).join(', '):'')+'</div></div></div>';}).join('')+'</div></div>');
  if(a.length>=3) slides.push('<div class="slide sl7" id="s'+(slides.length)+'"><div class="s-eye" style="margin-bottom:0.7rem;">Your Top Artists</div><div class="tti-list">'+a.slice(0,5).map(function(ar,i){return'<div class="tti"><div class="tti-n">'+(i+1)+'</div><img class="tti-img r" src="'+(ar.images&&ar.images[2]?ar.images[2].url:ar.images&&ar.images[0]?ar.images[0].url:'')+'" alt=""/><div class="tti-info"><div class="tti-name">'+ar.name+'</div><div class="tti-art">'+((ar.genres&&ar.genres[0])||'artist')+'</div></div></div>';}).join('')+'</div></div>');
  slides.push('<div class="slide slf" id="s'+(slides.length)+'"><div style="font-size:3rem;margin-bottom:1rem;">🎵</div><div class="s-main">That\'s your<br/>sound today</div><div class="s-sub" style="margin-top:0.5rem;">Come back tomorrow</div><button id="wDone" style="margin-top:1.75rem;background:linear-gradient(135deg,var(--b),var(--p));color:#fff;border:none;border-radius:14px;padding:0.85rem 2rem;font-weight:700;font-size:0.88rem;cursor:pointer;font-family:Plus Jakarta Sans,sans-serif;">Done ✓</button></div>');
  return slides;
}

function openWrapped() {
  haptic('m');
  var slides = buildSlides();
  document.getElementById('wrappedScreen').style.display='block';
  document.getElementById('bnav').style.display='none';
  document.getElementById('psegs').innerHTML = slides.map(function(_,i){return'<div class="pseg"><div class="psf" id="psf-'+i+'"></div></div>';}).join('');
  document.getElementById('slidesWrap').innerHTML = slides.join('');
  slideIdx=0;
  showSlide(0);
  // Wire done button
  setTimeout(function(){var d=document.getElementById('wDone');if(d)d.addEventListener('click',closeWrapped);},100);
}

function showSlide(idx) {
  if(slideTimer) clearTimeout(slideTimer);
  var all = document.querySelectorAll('.slide');
  all.forEach(function(s,i){
    s.classList.remove('active');
    var f=document.getElementById('psf-'+i);
    if(!f) return;
    if(i<idx){f.style.transition='none';f.style.width='100%';}
    else{f.style.transition='';f.style.width='0%';}
  });
  if(idx>=all.length){closeWrapped();return;}
  all[idx].classList.add('active');
  haptic('l');
  var f=document.getElementById('psf-'+idx);
  if(f){f.style.width='0%';setTimeout(function(){f.style.transition='width 5s linear';f.style.width='100%';},50);}
  slideIdx=idx;
  slideTimer=setTimeout(function(){nextSlide();},5000);
}
function nextSlide(){var n=document.querySelectorAll('.slide').length;if(slideIdx+1>=n)closeWrapped();else showSlide(slideIdx+1);}
function prevSlide(){if(slideIdx>0)showSlide(slideIdx-1);}
function closeWrapped(){if(slideTimer)clearTimeout(slideTimer);document.getElementById('wrappedScreen').style.display='none';document.getElementById('bnav').style.display='flex';}

// ── PAGE NAVIGATION ──
function showPage(page) {
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  var nb=document.getElementById('nb-'+page); if(nb) nb.classList.add('active');
  ['homeScreen','diaryPage','statsPage'].forEach(function(id){var e=document.getElementById(id);if(e)e.classList.remove('active');});
  haptic('l');
  if(page==='home') document.getElementById('homeScreen').classList.add('active');
  else if(page==='diary'){document.getElementById('diaryPage').classList.add('active');loadDiary();}
  else if(page==='stats'){document.getElementById('statsPage').classList.add('active');loadStats();}
}

// ── WIRE UP ALL BUTTONS ──
window.addEventListener('load', function(){
  document.getElementById('loginBtn').addEventListener('click', loginWithSpotify);
  document.getElementById('saveBtn').addEventListener('click', saveToday);
  document.getElementById('nb-home').addEventListener('click', function(){showPage('home');});
  document.getElementById('nb-diary').addEventListener('click', function(){showPage('diary');});
  document.getElementById('nb-stats').addEventListener('click', function(){showPage('stats');});
  document.getElementById('nb-replay').addEventListener('click', openWrapped);
  document.getElementById('closeBtn').addEventListener('click', closeWrapped);
  document.getElementById('sTL').addEventListener('click', prevSlide);
  document.getElementById('sTR').addEventListener('click', nextSlide);

  // Start app
  init();
});

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}
